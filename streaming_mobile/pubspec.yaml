name: streaming_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  supabase_flutter: ^2.15.3
  go_router: ^17.3.0
  cached_network_image: ^3.4.1
  flutter_dotenv: ^6.0.1
  video_player: ^2.11.1
  chewie: ^1.14.1
  audioplayers: ^6.0.0
  wakelock_plus: ^1.6.1
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  integration_test:
    sdk: flutter
flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/sounds/
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit/Outfit-VariableFont_wght.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-VariableFont_opsz,wght.ttf
        - asset: assets/fonts/Inter/Inter-Italic-VariableFont_opsz,wght.ttf
          style: italic

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/apps.icon.png"
