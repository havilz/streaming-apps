name: Build & Release StreamVault APK

on:
  push:
    branches:
      - main
    paths:
      - 'streaming_mobile/**'
      - '.github/workflows/release.yml'

jobs:
  build-and-release:
    name: Build and Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Wajib agar semua tag historis terunduh untuk kalkulasi versi baru

      - name: Get Next Tag
        id: next_tag
        run: |
          git fetch --tags
          latest_tag=$(git tag --sort=-v:refname | grep -E '^v?1\.0\.0\.[0-9]+$' | head -n 1)
          if [ -z "$latest_tag" ]; then
            next_tag="v1.0.0.3" # Default jika tidak ada sama sekali, tapi kita tahu ada 1.0.0.2
          else
            # Bersihkan huruf 'v' jika ada untuk mengambil angka terakhir secara konsisten
            clean_tag=$(echo "$latest_tag" | sed 's/^v//')
            last_num=$(echo "$clean_tag" | awk -F. '{print $4}')
            next_num=$((last_num + 1))
            next_tag="v1.0.0.$next_num"
          fi
          echo "tag=$next_tag" >> $GITHUB_OUTPUT
          echo "Calculated next tag: $next_tag"

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > streaming_mobile/.env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> streaming_mobile/.env

      - name: Build APK
        run: |
          cd streaming_mobile
          flutter pub get
          flutter build apk --release

      - name: Prepare Release Asset
        run: |
          cp streaming_mobile/build/app/outputs/flutter-apk/app-release.apk streaming_mobile/build/app/outputs/flutter-apk/StreamVault-${{ steps.next_tag.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.next_tag.outputs.tag }}
          name: StreamVault ${{ steps.next_tag.outputs.tag }}
          files: streaming_mobile/build/app/outputs/flutter-apk/StreamVault-${{ steps.next_tag.outputs.tag }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
